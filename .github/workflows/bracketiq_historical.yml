# BracketIQ — Historical tables only (fanmatch, odds, ats). Run manually to verify historical pipeline.
name: BracketIQ Historical Only

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: bracketiq

jobs:
  historical:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create data directories
        run: |
          mkdir -p app/data/cache
          mkdir -p app/data/historical
      - name: Pull Historical from Neon
        env:
          NEON_DATABASE_URL: ${{ secrets.DB_URL }}
        run: python -m scripts.pull_from_neon
        continue-on-error: true
      - name: Collect FanMatch
        env:
          KENPOM_EMAIL: ${{ secrets.KENPOM_EMAIL }}
          KENPOM_PASSWORD: ${{ secrets.KENPOM_PASSWORD }}
        run: python -m scripts.collect_historical_fanmatch
        continue-on-error: true
      - name: Collect Odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python -m scripts.collect_historical_odds
        continue-on-error: true
      - name: Build ATS Dataset
        run: python -m scripts.build_ats_dataset
        continue-on-error: true
      - name: Push Historical to Neon
        env:
          NEON_DATABASE_URL: ${{ secrets.DB_URL }}
        run: python -m scripts.push_to_neon --only historical

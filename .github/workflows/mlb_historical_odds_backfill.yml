name: MLB Historical Odds Backfill

# Manual backfill for historical closing lines via The Odds API.
# Requires a paid Odds API plan (historical endpoint).
# Cost: ~30 credits per slate date (full-game bulk call).

on:
  workflow_dispatch:
    inputs:
      backfill_start:
        description: 'Range start (YYYYMMDD, ET slate dates)'
        required: true
      backfill_end:
        description: 'Range end (YYYYMMDD, ET slate dates)'
        required: true
      include_f5:
        description: 'Also fetch F5 markets (expensive: +30 credits per matched game)'
        required: false
        type: boolean
        default: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: mlb_odds_update
        run: pip install -r requirements.txt

      - name: Run historical odds backfill
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          BACKFILL_START: ${{ github.event.inputs.backfill_start }}
          BACKFILL_END: ${{ github.event.inputs.backfill_end }}
          INCLUDE_F5: ${{ github.event.inputs.include_f5 }}
          ODDS_REQUEST_SLEEP_SEC: '1.0'
          LOG_LEVEL: INFO
        run: python -m mlb_odds_update

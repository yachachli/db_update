name: MLB Games Update

on:
  schedule:
    # Morning slate build — most probables already posted overnight.
    # 11:00 UTC ≈ 7am ET (EDT) / 6am ET (EST)
    - cron: '0 11 * * *'
    # Midday refresh — catch late morning announcements before afternoon starts.
    # 16:00 UTC ≈ 12pm ET (EDT)
    - cron: '0 16 * * *'
    # Pre-evening refresh — last look before most 7pm ET first pitches.
    # 20:00 UTC ≈ 4pm ET (EDT)
    - cron: '0 20 * * *'
    # Night / West Coast pass — late changes + tomorrow's early listings.
    # 23:00 UTC ≈ 7pm ET (EDT)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Single date override (YYYY-MM-DD). Leave blank for today+tomorrow ET.'
        required: false
        default: ''
      backfill_days:
        description: 'Rolling backfill: re-run today + last N days. Use 0 for none.'
        required: false
        default: '0'
      backfill_start:
        description: 'Manual range start (YYYYMMDD). Pair with backfill_end.'
        required: false
        default: ''
      backfill_end:
        description: 'Manual range end (YYYYMMDD). Pair with backfill_start.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: mlb_games_update
        run: pip install -r requirements.txt

      - name: Run mlb_games_update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Empty string from schedule → live today+tomorrow ET mode in __main__
          TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '0' }}
          BACKFILL_START: ${{ github.event.inputs.backfill_start || '' }}
          BACKFILL_END: ${{ github.event.inputs.backfill_end || '' }}
          LOG_LEVEL: INFO
        run: python -m mlb_games_update

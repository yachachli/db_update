name: MLB Games Update

on:
  schedule:
    # 11:00 UTC = 6am ET during EST, 7am ET during EDT
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Single date override (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      backfill_days:
        description: 'Rolling backfill: re-run today + last N days. Use 0 for none.'
        required: false
        default: '0'
      backfill_start:
        description: 'Manual range start (YYYYMMDD). Pair with backfill_end.'
        required: false
        default: ''
      backfill_end:
        description: 'Manual range end (YYYYMMDD). Pair with backfill_start.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: mlb_games_update
        run: pip install -r requirements.txt

      - name: Run mlb_games_update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '0' }}
          BACKFILL_START: ${{ github.event.inputs.backfill_start || '' }}
          BACKFILL_END: ${{ github.event.inputs.backfill_end || '' }}
          LOG_LEVEL: INFO
        run: python -m mlb_games_update
